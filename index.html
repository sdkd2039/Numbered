<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة معدودات - الإصدار الشامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #f8fafc;
            --accent-gold: #c5a880;
            --border-color: #30363d;
            --green: #238636;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        
        /* التبويبات */
        .tabs-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .tab-btn { background: #21262d; border: 1px solid var(--border-color); color: white; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--accent-gold); color: black; }
        .panel-content { display: none; }
        .panel-content.active { display: block; }

        /* البطاقات */
        .box-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h2 { color: var(--accent-gold); margin-bottom: 15px; }
        
        /* البث المباشر */
        .live-stream-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 14px; overflow: hidden; margin-top: 10px; }
        .live-video-player { width: 100%; height: 100%; display: block; }
        
        /* الأذكار */
        .dhikr-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); }
        .mini-counter { background: #21262d; border: 1px solid var(--accent-gold); color: var(--accent-gold); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .mini-counter.done { background: var(--green); color: white; border-color: var(--green); }
    </style>
</head>
<body>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="showPanel('telawat')">التلاوات</button>
        <button class="tab-btn" onclick="showPanel('remaining')">المتبقي</button>
        <button class="tab-btn" onclick="showPanel('dhikr')">الأذكار</button>
        <button class="tab-btn" onclick="showPanel('live')">بث مباشر</button>
    </div>

    <div id="panel-telawat" class="panel-content active">
        <div class="box-card"><h2>قائمة التلاوات</h2><div id="telawat-list">جاري تحميل التلاوات...</div></div>
    </div>

    <div id="panel-remaining" class="panel-content">
        <div class="box-card"><h2>العد التنازلي</h2><div id="countdown-list">جاري التحميل...</div></div>
    </div>

    <div id="panel-dhikr" class="panel-content">
        <div class="box-card"><h2>قسم الأذكار (تصفير تلقائي 12 ص)</h2><div id="dhikr-list">جاري تحميل الأذكار...</div></div>
    </div>

    <div id="panel-live" class="panel-content">
        <div class="box-card">
            <h2>إذاعة القرآن الكريم</h2>
            <audio id="live-audio" controls style="width:100%"></audio>
        </div>
        <div class="box-card">
            <h2>الحرم المكي</h2>
            <div class="live-stream-container"><video id="makkah-video" class="live-video-player" controls autoplay muted></video></div>
        </div>
        <div class="box-card">
            <h2>الحرم المدني</h2>
            <div class="live-stream-container"><video id="madinah-video" class="live-video-player" controls autoplay muted></video>
        </div>
    </div>

    <script>
        // التبويبات
        function showPanel(id) {
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 1. الإذاعة
        const audio = document.getElementById("live-audio");
        const radioUrl = "https://live.kwikmotion.com/sbrksaquranradiolive/srpksaquranradio/playlist.m3u8";
        if (Hls.isSupported()) {
            const hls = new Hls({ lowLatencyMode: true });
            hls.loadSource(radioUrl);
            hls.attachMedia(audio);
        }

        // 2. قنوات الحرمين (بدون iframe)
        function initStream(url, videoId) {
            const video = document.getElementById(videoId);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else {
                video.src = url;
            }
        }
        initStream("https://vdo.elahmad.com/live/qoransa.m3u8", "makkah-video");
        initStream("https://vdo.elahmad.com/live/sunnahsa.m3u8", "madinah-video");

        // 3. الأذكار (تصفير عند 12 ص)
        async function loadDhikr() {
            const SPREADSHEET_ID = '1BN23aKIJllQ_qKqilgbeugD2qOlf8exUPa4oftKVZrQ';
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=أذكار`;
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const container = document.getElementById('dhikr-list');
            
            // نظام التصفير
            const lastDate = localStorage.getItem('last_date');
            const today = new Date().toDateString();
            if(lastDate !== today) { localStorage.removeItem('dhikr_progress'); localStorage.setItem('last_date', today); }
            
            let progress = JSON.parse(localStorage.getItem('dhikr_progress') || '{}');

            container.innerHTML = "";
            json.table.rows.forEach((row, i) => {
                const txt = row.c[0]?.v;
                const count = parseInt(row.c[1]?.v || 1);
                const current = progress[i] !== undefined ? progress[i] : count;
                
                container.innerHTML += `
                    <div class="dhikr-row">
                        <span>${txt}</span>
                        <div class="mini-counter ${current === 0 ? 'done' : ''}" id="dk-${i}" onclick="count(${i}, ${count})">
                            ${current === 0 ? '✓' : current}
                        </div>
                    </div>`;
            });
        }

        function count(i, max) {
            let el = document.getElementById('dk-'+i);
            let val = el.innerText === '✓' ? 0 : parseInt(el.innerText);
            if(val > 1) { val--; el.innerText = val; }
            else { el.innerText = '✓'; el.classList.add('done'); val = 0; }
            
            let progress = JSON.parse(localStorage.getItem('dhikr_progress') || '{}');
            progress[i] = val;
            localStorage.setItem('dhikr_progress', JSON.stringify(progress));
        }

        loadDhikr();

        // 4. المشاركة بالثواني
        function shareTime(name, date, s, m, h, d) {
            const link = `https://maadodat.github.io/share?event=${encodeURIComponent(name)}&date=${date}&time=${s}s${m}m${h}h${d}d`;
            navigator.clipboard.writeText(link).then(() => alert("تم نسخ رابط المشاركة (شامل الثواني)"));
        }
    </script>
</body>
</html>
