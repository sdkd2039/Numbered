<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معدودات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-color: #0d1117; --card-bg: #161b22; --accent-gold: #c5a880; }
        body { background-color: var(--bg-color); color: #fff; font-family: 'Tajawal', sans-serif; padding: 10px; }
        .box-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #30363d; }
        
        /* واجهة الذكر الجديدة */
        .dhikr-focus-card { text-align: center; padding: 30px; }
        .dhikr-text { font-size: 1.5rem; line-height: 1.8; margin-bottom: 20px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .counter-btn { background: var(--accent-gold); border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 2rem; color: #000; }
        
        /* تحسين التلاوات للجوال */
        .telawat-item { padding: 15px; border-bottom: 1px solid #30363d; }
        video { width: 100%; border-radius: 12px; margin-top: 10px; }
        
        .tabs-container { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; color: #94a3b8; font-weight: bold; }
        .tab-btn.active { color: var(--accent-gold); }
    </style>
</head>
<body>

<div id="panel-dhikr" class="panel-content">
    <div class="box-card dhikr-focus-card">
        <h2 id="dhikr-title" style="color: var(--accent-gold); margin-bottom: 20px;">الذكر</h2>
        <div id="dhikr-display" class="dhikr-text"></div>
        <button class="counter-btn" onclick="nextDhikr()"><i class="fa-solid fa-plus"></i></button>
        <div id="dhikr-progress" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    let dhikrData = [];
    let currentIndex = 0;

    // جلب البيانات (يجب التأكد من ربط ملف JSON أو السبريد شيت)
    async function fetchData() {
        // ... (كود الجلب الخاص بك)
        // عند الانتهاء قم باستدعاء:
        renderCurrentDhikr();
    }

    function renderCurrentDhikr() {
        const item = dhikrData[currentIndex];
        document.getElementById('dhikr-display').innerText = item.text;
        document.getElementById('dhikr-progress').innerText = `الذكر ${currentIndex + 1} من ${dhikrData.length}`;
    }

    function nextDhikr() {
        if (currentIndex < dhikrData.length - 1) {
            currentIndex++;
            renderCurrentDhikr();
        } else {
            alert("تم إتمام جميع الأذكار!");
        }
    }
</script>
</body>
</html>
